<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wosobo Softphone — host demo</title>
    <style>
      :root {
        font-family: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
        color: #1a242c;
        background: #e8eef2;
      }
      body {
        margin: 0;
        padding: 2rem 1.25rem 4rem;
        max-width: 560px;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.35rem;
      }
      .lede {
        color: #5a6b76;
        margin: 0 0 1.25rem;
      }
      .card {
        background: #f7fafc;
        border: 1px solid #c5d2db;
        border-radius: 12px;
        padding: 1rem 1.1rem;
        display: grid;
        gap: 0.75rem;
      }
      label {
        display: grid;
        gap: 0.35rem;
        font-size: 0.9rem;
      }
      input {
        font: inherit;
        padding: 0.55rem 0.65rem;
        border: 1px solid #c5d2db;
        border-radius: 8px;
      }
      button {
        font: inherit;
        cursor: pointer;
        border: 1px solid #0f6e56;
        background: #0f6e56;
        color: #fff;
        padding: 0.55rem 0.9rem;
        border-radius: 8px;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      button.secondary {
        background: #fff;
        color: #1a242c;
        border-color: #c5d2db;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .error {
        color: #9b1c1c;
        margin: 0;
      }
      .hint {
        color: #5a6b76;
        font-size: 0.88rem;
        margin: 0;
      }
      code {
        font-family: ui-monospace, monospace;
        font-size: 0.85em;
      }
      pre.flow {
        margin: 0;
        padding: 0.65rem 0.75rem;
        background: #fff;
        border: 1px solid #c5d2db;
        border-radius: 8px;
        font-size: 12px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>Host backend demo</h1>
    <p class="lede">
      Пример: ваш backend держит <code>MANAGE_API_TOKEN</code>, минтает session и отдаёт
      token во фронт. Браузер подключает
      <code>/embed/softphone.js</code>.
    </p>

    <pre class="flow">UI (ник) → POST /demo/session → manage-api mint → {token,nick}
         → WosoboSoftphone.mount({ token, nick })</pre>

    <form class="card" id="form" style="margin-top: 1rem">
      <label>
        Ник
        <input id="nick" name="nick" value="alice" placeholder="alice" autocomplete="username" required />
      </label>
      <div class="row">
        <button type="submit" id="connect">Подключить</button>
        <button type="button" class="secondary" id="unmount">Unmount</button>
      </div>
      <p class="error" id="error" hidden></p>
      <p class="hint">Лог — кнопка «Лог» в floating-виджете.</p>
    </form>

    <script src="/embed/softphone.js"></script>
    <script>
      const form = document.getElementById("form");
      const errorEl = document.getElementById("error");
      const connectBtn = document.getElementById("connect");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorEl.hidden = true;
        const nick = document.getElementById("nick").value.trim();
        connectBtn.disabled = true;
        try {
          const res = await fetch("/demo/session", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nick }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.error || "HTTP " + res.status);
          }
          WosoboSoftphone.mount({
            nick: data.nick,
            token: data.token,
            onError(err) {
              errorEl.hidden = false;
              errorEl.textContent = err.message || String(err);
            },
            onAuthLost() {
              errorEl.hidden = false;
              errorEl.textContent = "Сессия истекла — подключите снова";
            },
          });
        } catch (err) {
          errorEl.hidden = false;
          errorEl.textContent = err.message || String(err);
        } finally {
          connectBtn.disabled = false;
        }
      });

      document.getElementById("unmount").addEventListener("click", () => {
        WosoboSoftphone.unmount();
      });
    </script>
  </body>
</html>
