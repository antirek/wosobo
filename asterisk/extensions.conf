[general]
static=yes
writeprotect=no

[internal]
; Тестовый номер: проигрывает мелодию (custom/hello.wav) и кладёт трубку
exten => 1000,1,NoOp(Playback test hello.wav)
 same => n,Answer()
 same => n,Playback(custom/hello)
 same => n,Hangup()

; Тот же файл по кругу ~12 сек (удобно слушать дольше)
exten => 1003,1,NoOp(Playback loop)
 same => n,Answer()
 same => n,Playback(custom/hello)
 same => n,Playback(custom/hello)
 same => n,Playback(custom/hello)
 same => n,Hangup()

; Echo: двусторонний звук (говорите в микрофон — слышите себя)
exten => 1004,1,NoOp(Echo test)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()

exten => 1001,1,NoOp(Call 1001)
 same => n,Dial(PJSIP/1001,60)
 same => n,Hangup()

exten => 1002,1,NoOp(Call 1002)
 same => n,Dial(PJSIP/1002,60)
 same => n,Hangup()
