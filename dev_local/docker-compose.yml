services:
  mongo:
    image: mongo:5.0.8
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  asterisk:
    image: andrius/asterisk:22
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "10000-10099:10000-10099/udp"
    volumes:
      - ./asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
      - ./asterisk/sounds/custom:/var/lib/asterisk/sounds/custom:ro
    restart: unless-stopped

  janus:
    image: canyan/janus-gateway:1.1.4
    command: ["/usr/local/bin/janus", "-F", "/usr/local/etc/janus"]
    ports:
      # WebRTC media (не HTTP) — браузер ходит сюда напрямую
      - "20000-20100:20000-20100/udp"
    volumes:
      - ./janus/janus.jcfg:/usr/local/etc/janus/janus.jcfg:ro
      - ./janus/janus.transport.http.jcfg:/usr/local/etc/janus/janus.transport.http.jcfg:ro
      - ./janus/janus.transport.websockets.jcfg:/usr/local/etc/janus/janus.transport.websockets.jcfg:ro
      - ./janus/janus.plugin.sip.jcfg:/usr/local/etc/janus/janus.plugin.sip.jcfg:ro
    depends_on:
      - asterisk
    restart: unless-stopped

  phone-server:
    build: ../packages/phone-server
    environment:
      PORT: "3101"
      WS_PORT: "3102"
      MONGODB_URI: mongodb://mongo:27017/janus_softphone
      CORS_ORIGIN: https://service,http://localhost
      JANUS_WS_URL: ws://janus:8188
      INTERNAL_TOKEN: dev-internal-token
      ABSENT_ANNOUNCE_FILE: /app/media/absent.wav
      ABSENT_ANNOUNCE_MAX_SEC: "30"
    depends_on:
      - mongo
      - janus
    restart: unless-stopped

  manage-api:
    build: ../packages/manage-api
    environment:
      PORT: "3121"
      MONGODB_URI: mongodb://mongo:27017/janus_softphone
      CORS_ORIGIN: https://service,http://localhost
      MANAGE_API_TOKEN: dev-manage-token
      OPENAPI_SERVER_URL: /manage-api
      PHONE_SERVER_URL: http://phone-server:3101
      INTERNAL_TOKEN: dev-internal-token
    depends_on:
      - mongo
      - phone-server
    restart: unless-stopped

  monitor:
    build: ../packages/monitor
    environment:
      PORT: "3110"
      JANUS_ADMIN_URL: http://janus:7088/admin
      JANUS_ADMIN_SECRET: janusoverlord
    depends_on:
      - janus
    restart: unless-stopped

  softphone-demo:
    build: ../packages/softphone-demo
    environment:
      PORT: "3130"
      MANAGE_API_URL: http://manage-api:3121
      MANAGE_API_TOKEN: dev-manage-token
      CORS_ORIGIN: https://service,http://localhost
    depends_on:
      - manage-api
    restart: unless-stopped

  static:
    build:
      context: ..
      dockerfile: packages/static-server/Dockerfile
    environment:
      PORT: "3140"
      STATIC_ROOT: /srv
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - phone-server
      - manage-api
      - monitor
      - softphone-demo
      - static
    restart: unless-stopped

volumes:
  mongo_data:
  caddy_data:
