# Generated by ../configure.sh — deploy this directory as a unit.
#
#   docker-compose up -d
#
# Compose loads `.env` from this directory automatically (interpolation + wosobo env_file).
# Image `wosobo` must already be on the host (docker pull / load).
# SIP PBX is external. Stack: mongo + janus + caddy + wosobo.

services:
  mongo:
    image: mongo:5.0.8
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  janus:
    image: canyan/janus-gateway:1.1.4
    command: ["/usr/local/bin/janus", "-F", "/usr/local/etc/janus"]
    ports:
      - "${JANUS_RTP_START:-20000}-${JANUS_RTP_END:-20100}:${JANUS_RTP_START:-20000}-${JANUS_RTP_END:-20100}/udp"
    volumes:
      - ./janus/janus.jcfg:/usr/local/etc/janus/janus.jcfg:ro
      - ./janus/janus.transport.http.jcfg:/usr/local/etc/janus/janus.transport.http.jcfg:ro
      - ./janus/janus.transport.websockets.jcfg:/usr/local/etc/janus/janus.transport.websockets.jcfg:ro
      - ./janus/janus.plugin.sip.jcfg:/usr/local/etc/janus/janus.plugin.sip.jcfg:ro
    restart: unless-stopped

  wosobo:
    image: ${WOSOBO_IMAGE:-wosobo:latest}
    env_file:
      - .env
    networks:
      default:
        aliases:
          - phone-server
          - manage-api
          - monitor
          - softphone-demo
          - static
    depends_on:
      - mongo
      - janus
    restart: unless-stopped

  caddy:
    image: ${CADDY_IMAGE:-caddy:2.8-alpine}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - wosobo
    restart: unless-stopped

volumes:
  mongo_data:
  caddy_data:
