# Production deploy template for Wosobo softphone stand.
#
# From repository root:
#   cp prod_deploy/.env.example prod_deploy/.env   # edit secrets / host
#   docker compose -f prod_deploy/docker-compose.yml --env-file prod_deploy/.env up -d
#
# Image `wosobo` runs: phone-server, manage-api, monitor, softphone-demo, static-server.
# SIP PBX — внешний. В compose: Mongo / Janus / Caddy / wosobo.

services:
  mongo:
    image: mongo:5.0.8
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  janus:
    image: canyan/janus-gateway:1.1.4
    command: ["/usr/local/bin/janus", "-F", "/usr/local/etc/janus"]
    ports:
      - "${JANUS_RTP_START:-20000}-${JANUS_RTP_END:-20100}:${JANUS_RTP_START:-20000}-${JANUS_RTP_END:-20100}/udp"
    volumes:
      - ./janus/janus.jcfg:/usr/local/etc/janus/janus.jcfg:ro
      - ./janus/janus.transport.http.jcfg:/usr/local/etc/janus/janus.transport.http.jcfg:ro
      - ./janus/janus.transport.websockets.jcfg:/usr/local/etc/janus/janus.transport.websockets.jcfg:ro
      - ./janus/janus.plugin.sip.jcfg:/usr/local/etc/janus/janus.plugin.sip.jcfg:ro
    restart: unless-stopped

  wosobo:
    image: ${WOSOBO_IMAGE:-wosobo:latest}
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/janus_softphone}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://service,http://localhost}
      JANUS_WS_URL: ${JANUS_WS_URL:-ws://janus:8188}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:?set INTERNAL_TOKEN in prod_deploy/.env}
      MANAGE_API_TOKEN: ${MANAGE_API_TOKEN:?set MANAGE_API_TOKEN in prod_deploy/.env}
      OPENAPI_SERVER_URL: ${OPENAPI_SERVER_URL:-/manage-api}
      ABSENT_ANNOUNCE_MAX_SEC: ${ABSENT_ANNOUNCE_MAX_SEC:-30}
      CALL_CDR_TTL_SEC: ${CALL_CDR_TTL_SEC:-172800}
      JANUS_ADMIN_URL: ${JANUS_ADMIN_URL:-http://janus:7088/admin}
      JANUS_ADMIN_SECRET: ${JANUS_ADMIN_SECRET:-janusoverlord}
    networks:
      default:
        aliases:
          - phone-server
          - manage-api
          - monitor
          - softphone-demo
          - static
    depends_on:
      - mongo
      - janus
    restart: unless-stopped

  caddy:
    image: ${CADDY_IMAGE:-caddy:2.8-alpine}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - wosobo
    restart: unless-stopped

volumes:
  mongo_data:
  caddy_data:
